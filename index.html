<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampaignOS — 行銷活動管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --bg2: #141416;
    --bg3: #1c1c20;
    --bg4: #242428;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text2: #9c9890;
    --text3: #5c5a56;
    --accent: #c8f135;
    --accent2: #a8d020;
    --accent-dim: rgba(200,241,53,0.12);
    --accent-dim2: rgba(200,241,53,0.06);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }

  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    display: flex; align-items: center; gap: 8px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav {
    padding: 16px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nav-section-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 8px 4px;
    margin-top: 8px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 400;
    color: var(--text2);
    transition: all 0.15s;
    text-decoration: none;
    position: relative;
  }

  .nav-item:hover { background: var(--bg3); color: var(--text); }

  .nav-item.active {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 500;
  }

  .nav-item .nav-icon {
    width: 16px; height: 16px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .nav-item.active .nav-icon { opacity: 1; }

  .nav-badge {
    margin-left: auto;
    background: var(--bg4);
    color: var(--text2);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 99px;
  }

  .nav-item.active .nav-badge {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }

  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .user-card:hover { background: var(--bg3); }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8f135, #60a5fa);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: #000;
    flex-shrink: 0;
  }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 12.5px; font-weight: 500; color: var(--text); }
  .user-role { font-size: 11px; color: var(--text3); }

  /* MAIN */
  .main {
    margin-left: 220px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    height: 60px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 28px;
    gap: 16px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 50;
  }

  .topbar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .search-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    width: 220px;
    transition: border 0.15s;
  }

  .search-bar:focus-within { border-color: var(--border2); }

  .search-bar svg { width: 13px; height: 13px; opacity: 0.4; flex-shrink: 0; }

  .search-bar input {
    background: none; border: none; outline: none;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--text3); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0f;
  }

  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-ghost {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { background: var(--bg4); color: var(--text); }

  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

  /* PAGE CONTENT */
  .page { padding: 28px; }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }

  .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 0 var(--radius-lg) 0 60px;
    opacity: 0.06;
  }

  .stat-card.green::before { background: var(--green); }
  .stat-card.amber::before { background: var(--amber); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.accent::before { background: var(--accent); }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.amber .stat-value { color: var(--amber); }
  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.accent .stat-value { color: var(--accent); }

  .stat-delta {
    font-size: 11px;
    color: var(--text3);
  }

  .stat-delta .up { color: var(--green); }
  .stat-delta .down { color: var(--red); }

  /* FILTER ROW */
  .filter-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 18px;
  }

  .filter-tab {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 99px;
    font-size: 12.5px;
    font-weight: 400;
    color: var(--text2);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: none;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-tab:hover { background: var(--bg3); color: var(--text); }

  .filter-tab.active {
    background: var(--bg3);
    border-color: var(--border2);
    color: var(--text);
    font-weight: 500;
  }

  .filter-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-green { background: var(--green); }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--red); }
  .dot-blue { background: var(--blue); }
  .dot-gray { background: var(--text3); }

  .filter-count {
    font-size: 10px;
    background: var(--bg4);
    color: var(--text3);
    padding: 1px 6px;
    border-radius: 99px;
  }

  .filter-tab.active .filter-count {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* CAMPAIGN TABLE */
  .table-wrapper {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .table-header {
    display: flex; align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .table-header-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .table-header-sub {
    font-size: 12px;
    color: var(--text3);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    white-space: nowrap;
  }

  thead th:first-child { padding-left: 20px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    cursor: pointer;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }

  tbody td {
    padding: 14px 20px;
    vertical-align: middle;
    color: var(--text2);
  }

  tbody td:first-child { color: var(--text); }

  .campaign-name-cell { display: flex; align-items: center; gap: 10px; }

  .campaign-thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .campaign-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .campaign-type { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* STATUS BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .badge-live { background: var(--green-dim); color: var(--green); }
  .badge-live .badge-dot { background: var(--green); animation: pulse 1.8s ease-in-out infinite; }

  .badge-draft { background: var(--bg4); color: var(--text3); }
  .badge-draft .badge-dot { background: var(--text3); }

  .badge-scheduled { background: var(--blue-dim); color: var(--blue); }
  .badge-scheduled .badge-dot { background: var(--blue); }

  .badge-ended { background: var(--red-dim); color: var(--red); }
  .badge-ended .badge-dot { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* PROGRESS BAR */
  .progress-wrap { width: 100%; }

  .progress-bar {
    height: 4px;
    background: var(--bg4);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.3s;
  }

  .progress-label { font-size: 11px; color: var(--text3); }

  /* ROW ACTIONS */
  .row-actions {
    display: flex; align-items: center; gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  tr:hover .row-actions { opacity: 1; }

  .action-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--bg4);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text2);
  }

  .action-btn:hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }

  .action-btn svg { width: 13px; height: 13px; }

  .toggle-btn {
    position: relative;
    width: 36px; height: 20px;
    border-radius: 99px;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-btn.on { background: var(--accent); }
  .toggle-btn.off { background: var(--bg4); }

  .toggle-btn::after {
    content: '';
    position: absolute;
    top: 3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    transition: left 0.2s;
  }

  .toggle-btn.on::after { left: 19px; }
  .toggle-btn.off::after { left: 3px; background: var(--text3); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    width: 480px;
    max-width: 90vw;
    padding: 28px;
    transform: translateY(12px);
    transition: transform 0.2s;
  }

  .modal-overlay.visible .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--bg3);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
    transition: all 0.15s;
  }

  .modal-close:hover { background: var(--bg4); color: var(--text); }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border 0.15s;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }

  select.form-input { cursor: pointer; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 300;
    display: flex; flex-direction: column; gap: 8px;
  }

  .toast {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    transform: translateX(100px);
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    min-width: 240px;
  }

  .toast.show { transform: translateX(0); opacity: 1; }

  .toast-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .toast-success .toast-icon { background: var(--green-dim); color: var(--green); }
  .toast-warning .toast-icon { background: var(--amber-dim); color: var(--amber); }

  /* TIMELINE INDICATOR */
  .timeline-cell {
    font-size: 11.5px;
    color: var(--text3);
    line-height: 1.6;
  }

  /* EMPTY */
  .table-empty {
    padding: 48px 20px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
  }

  /* PAGE FADE-IN */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate { animation: fadeUp 0.4s ease both; }
  .delay-1 { animation-delay: 0.05s; }
  .delay-2 { animation-delay: 0.1s; }
  .delay-3 { animation-delay: 0.15s; }
  .delay-4 { animation-delay: 0.2s; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none">

      <span class="nav-badge">5</span>
    </a>

    <a href="#" class="nav-item">

      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

      <span class="nav-badge">4</span>

    </a>

    <a href="#" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M8 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

  </nav>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar">陳</div>
      <div class="user-info">
        <div class="user-name">陳小明</div>
        <div class="user-role">審核者</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <span class="topbar-title">活動總覽</span>
    <div class="topbar-right">
      <div class="search-bar">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" placeholder="搜尋活動名稱…" id="searchInput">
      </div>
      <button class="btn btn-ghost btn-sm" onclick="showToast('篩選功能開發中', 'warning')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 8h6M7 12h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        篩選
      </button>
      <button class="btn btn-primary btn-sm" onclick="openModal()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        建立活動
      </button>
    </div>
  </div>

  <div class="page">

    <!-- STATS -->
    <div class="stats-grid animate">
      <div class="stat-card green">
        <div class="stat-label">上架中</div>
        <div class="stat-value">5</div>
        <div class="stat-delta"><span class="up">↑ 2</span> 較上週</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">排程中</div>
        <div class="stat-value">3</div>
        <div class="stat-delta">本週即將上架</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">草稿</div>
        <div class="stat-value">4</div>
        <div class="stat-delta"><span class="down">↓ 1</span> 較上週</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-label">本月總活動數</div>
        <div class="stat-value">12</div>
        <div class="stat-delta"><span class="up">↑ 33%</span> 較上月</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-row animate delay-2">
      <button class="filter-tab active" onclick="filterCampaigns('all', this)">
        全部
        <span class="filter-count">12</span>
      </button>
      <button class="filter-tab" onclick="filterCampaigns('live', this)">
        <span class="filter-dot dot-green"></span>上架中
        <span class="filter-count">5</span>
      </button>
      <button class="filter-tab" onclick="filterCampaigns('scheduled', this)">
        <span class="filter-dot dot-blue"></span>排程中
        <span class="filter-count">3</span>
      </button>
      <button class="filter-tab" onclick="filterCampaigns('draft', this)">
        <span class="filter-dot dot-gray"></span>草稿
        <span class="filter-count">4</span>
      </button>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper animate delay-3">
      <div class="table-header">
        <span class="table-header-title">行銷活動列表</span>
        <span class="table-header-sub">共顯示 <span id="campaignCount">12</span> 筆</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>活動名稱</th>
            <th>狀態</th>
            <th>上架時間</th>
            <th>下架時間</th>
            <th>進度</th>
            <th>建立者</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="campaignTable"></tbody>
      </table>
    </div>

  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">建立新活動</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">填寫基本資訊以建立草稿</div>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">活動名稱 *</label>
      <input type="text" class="form-input" placeholder="e.g. 618 夏季購物節" id="newName">
    </div>

    <div class="form-group">
      <label class="form-label">活動類型</label>
      <select class="form-input" id="newType">
        <option value="🛒">🛒 電商促銷</option>
        <option value="🎉">🎉 節慶活動</option>
        <option value="📧">📧 Email 行銷</option>
        <option value="📱">📱 社群推廣</option>
        <option value="🎯">🎯 精準投放</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">上架日期</label>
        <input type="date" class="form-input" id="newStart">
      </div>
      <div class="form-group">
        <label class="form-label">下架日期</label>
        <input type="date" class="form-input" id="newEnd">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">建立者</label>
      <input type="text" class="form-input" placeholder="負責行銷人員姓名" id="newOwner">
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="createCampaign()">建立草稿</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>

<script>
const campaigns = [
  { id:1, name:'618 夏季購物節', type:'🛒', status:'live', start:'2025-06-01', end:'2025-06-18', owner:'王小華', progress:62 },
  { id:2, name:'母親節限定優惠', type:'🎉', status:'live', start:'2025-05-08', end:'2025-05-12', owner:'陳小明', progress:90 },
  { id:3, name:'新品上市推廣', type:'📱', status:'live', start:'2025-06-10', end:'2025-06-30', owner:'林美玲', progress:35 },
  { id:4, name:'VIP 會員早鳥活動', type:'🎯', status:'live', start:'2025-06-05', end:'2025-06-15', owner:'張大偉', progress:78 },
  { id:5, name:'端午節限定好禮', type:'🎉', status:'live', start:'2025-06-09', end:'2025-06-11', owner:'王小華', progress:55 },
  { id:6, name:'暑假旅遊特輯', type:'📧', status:'scheduled', start:'2025-07-01', end:'2025-08-31', owner:'陳小明', progress:0 },
  { id:7, name:'七夕情人節活動', type:'🎉', status:'scheduled', start:'2025-08-05', end:'2025-08-07', owner:'林美玲', progress:0 },
  { id:8, name:'週年慶預熱', type:'🛒', status:'scheduled', start:'2025-09-01', end:'2025-09-10', owner:'張大偉', progress:0 },
  { id:9, name:'Q3 品牌形象廣告', type:'📱', status:'draft', start:'—', end:'—', owner:'王小華', progress:0 },
  { id:10, name:'雙 11 預備企劃', type:'🛒', status:'draft', start:'—', end:'—', owner:'林美玲', progress:0 },
  { id:11, name:'聖誕節倒數活動', type:'🎉', status:'draft', start:'—', end:'—', owner:'陳小明', progress:0 },
  { id:12, name:'新年跨年直播', type:'📱', status:'draft', start:'—', end:'—', owner:'張大偉', progress:0 },
];

let currentFilter = 'all';
let currentSearch = '';

function getStatusBadge(status) {
  const map = {
    live: `<span class="badge badge-live"><span class="badge-dot"></span>上架中</span>`,
    scheduled: `<span class="badge badge-scheduled"><span class="badge-dot"></span>排程中</span>`,
    draft: `<span class="badge badge-draft"><span class="badge-dot"></span>草稿</span>`,
    ended: `<span class="badge badge-ended"><span class="badge-dot"></span>已下架</span>`,
  };
  return map[status] || '';
}

function getProgressColor(p) {
  if (p >= 70) return 'var(--green)';
  if (p >= 30) return 'var(--amber)';
  return 'var(--blue)';
}

function renderTable() {
  const tbody = document.getElementById('campaignTable');
  let filtered = campaigns.filter(c => {
    const matchFilter = currentFilter === 'all' || c.status === currentFilter;
    const matchSearch = c.name.toLowerCase().includes(currentSearch.toLowerCase()) || c.owner.includes(currentSearch);
    return matchFilter && matchSearch;
  });

  document.getElementById('campaignCount').textContent = filtered.length;

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="table-empty">找不到符合條件的活動</div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(c => {
    const progressHtml = c.progress > 0
      ? `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${c.progress}%;background:${getProgressColor(c.progress)}"></div></div><div class="progress-label">${c.progress}%</div></div>`
      : `<span style="color:var(--text3);font-size:12px">—</span>`;

    const toggleClass = c.status === 'live' ? 'on' : 'off';
    const canToggle = c.status === 'live' || c.status === 'draft' || c.status === 'scheduled';

    return `
    <tr>
      <td>
        <div class="campaign-name-cell">
          <div class="campaign-thumb" style="background:var(--bg4)">${c.type}</div>
          <div>
            <div class="campaign-name">${c.name}</div>
            <div class="campaign-type"># ${c.id}</div>
          </div>
        </div>
      </td>
      <td>${getStatusBadge(c.status)}</td>
      <td><div class="timeline-cell">${c.start}</div></td>
      <td><div class="timeline-cell">${c.end}</div></td>
      <td>${progressHtml}</td>
      <td style="font-size:12.5px">${c.owner}</td>
      <td>
        <div class="row-actions">
          ${canToggle ? `<button class="toggle-btn ${toggleClass}" title="${c.status==='live'?'下架':'上架'}" onclick="toggleStatus(${c.id}, event)"></button>` : '<span style="width:36px;display:inline-block"></span>'}
          <div class="action-btn" title="預覽" onclick="showToast('預覽: ${c.name}', 'success')">
            <svg viewBox="0 0 16 16" fill="none"><path d="M1.5 8C3.5 4.5 12.5 4.5 14.5 8C12.5 11.5 3.5 11.5 1.5 8Z" stroke="currentColor" stroke-width="1.3" fill="none"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>
          </div>
          <div class="action-btn" title="編輯" onclick="showToast('進入編輯: ${c.name}', 'success')">
            <svg viewBox="0 0 16 16" fill="none"><path d="M10 3l3 3L5 14H2v-3L10 3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/></svg>
          </div>
          <div class="action-btn" title="刪除" onclick="deleteCampaign(${c.id})">
            <svg viewBox="0 0 16 16" fill="none"><path d="M3 5h10M6 5V3h4v2M6 8v4M10 8v4M4 5l1 8h6l1-8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function toggleStatus(id, e) {
  e.stopPropagation();
  const c = campaigns.find(x => x.id === id);
  if (!c) return;
  if (c.status === 'live') {
    c.status = 'ended';
    showToast(`已下架：${c.name}`, 'warning');
  } else if (c.status === 'draft' || c.status === 'scheduled') {
    c.status = 'live';
    c.progress = 5;
    showToast(`已上架：${c.name}`, 'success');
  }
  renderTable();
}

function deleteCampaign(id) {
  const c = campaigns.find(x => x.id === id);
  if (!c) return;
  if (c.status === 'live') {
    showToast('請先下架活動再刪除', 'warning');
    return;
  }
  if (confirm(`確定要刪除「${c.name}」？此操作無法復原。`)) {
    const idx = campaigns.findIndex(x => x.id === id);
    campaigns.splice(idx, 1);
    showToast(`已刪除：${c.name}`, 'success');
    renderTable();
  }
}

function filterCampaigns(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderTable();
});

function openModal() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('newStart').value = today;
  document.getElementById('modal').classList.add('visible');
}

function closeModal() {
  document.getElementById('modal').classList.remove('visible');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function createCampaign() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { showToast('請輸入活動名稱', 'warning'); return; }
  const type = document.getElementById('newType').value;
  const start = document.getElementById('newStart').value || '—';
  const end = document.getElementById('newEnd').value || '—';
  const owner = document.getElementById('newOwner').value.trim() || '未知';
  const newId = campaigns.reduce((max, c) => Math.max(max, c.id), 0) + 1;
  campaigns.unshift({ id: newId, name, type, status: 'draft', start, end, owner, progress: 0 });
  closeModal();
  showToast(`草稿已建立：${name}`, 'success');
  document.getElementById('newName').value = '';
  document.getElementById('newOwner').value = '';
  renderTable();
}

let toastTimer = null;

function showToast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;

  const iconHtml = type === 'success'
    ? `<div class="toast-icon"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
    : `<div class="toast-icon"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 3v4M6 9v.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>`;

  toast.innerHTML = `${iconHtml}<span>${msg}</span>`;
  container.appendChild(toast);
  requestAnimationFrame(() => { requestAnimationFrame(() => toast.classList.add('show')); });
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

renderTable();
</script>
</body>
</html>
